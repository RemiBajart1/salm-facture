plugins {
    id 'io.micronaut.application'   version '4.6.2'
    id 'io.micronaut.aot'           version '4.6.2'
    id 'com.gradleup.shadow'        version '9.3.2'
    id 'jacoco'
}

version = '1.0.0'
group   = 'org.ucjgsalm.locagest'

application {
    mainClass = 'io.micronaut.function.aws.runtime.MicronautLambdaRuntime'
}

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

repositories {
    mavenCentral()
}

dependencies {
    // Micronaut core
    implementation 'io.micronaut:micronaut-http-server-netty'
    implementation 'io.micronaut:micronaut-jackson-databind'
    implementation 'io.micronaut.serde:micronaut-serde-jackson'
    implementation 'io.micronaut.security:micronaut-security-jwt'
    implementation 'io.micronaut.validation:micronaut-validation'
    annotationProcessor 'io.micronaut:micronaut-http-validation'
    annotationProcessor 'io.micronaut.validation:micronaut-validation-processor'
    annotationProcessor 'io.micronaut.serde:micronaut-serde-processor'

    // Lambda SnapStart
    implementation 'io.micronaut.aws:micronaut-function-aws-api-proxy'
    runtimeOnly     'com.amazonaws:aws-lambda-java-events:3.11.4'

    // Database
    implementation 'io.micronaut.flyway:micronaut-flyway'
    // Flyway 10.x a séparé le support par SGBD dans des modules distincts
    implementation 'org.flywaydb:flyway-database-postgresql:10.17.1'
    implementation 'io.micronaut.sql:micronaut-jdbc-hikari'
    runtimeOnly     'org.postgresql:postgresql:42.7.3'
    implementation 'jakarta.transaction:jakarta.transaction-api'

    // AWS SDK v2
    implementation platform('software.amazon.awssdk:bom:2.25.60')
    implementation 'software.amazon.awssdk:s3'
    implementation 'software.amazon.awssdk:ses'
    implementation 'software.amazon.awssdk:url-connection-client'

    // PDF
    implementation 'org.apache.pdfbox:pdfbox:3.0.2'

    // Email MIME
    implementation 'jakarta.mail:jakarta.mail-api:2.1.3'
    runtimeOnly     'org.eclipse.angus:angus-mail:2.0.3'
    implementation 'jakarta.activation:jakarta.activation-api:2.1.3'

    // Lombok
    compileOnly                'org.projectlombok:lombok:1.18.42'
    annotationProcessor        'org.projectlombok:lombok:1.18.42'
    testCompileOnly            'org.projectlombok:lombok:1.18.42'
    testAnnotationProcessor    'org.projectlombok:lombok:1.18.42'

    // YAML support (application.yml)
    runtimeOnly 'org.yaml:snakeyaml'

    // Tests unitaires
    testImplementation 'io.micronaut.test:micronaut-test-junit5'
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testImplementation 'org.junit.jupiter:junit-jupiter-params'
    testRuntimeOnly    'org.junit.jupiter:junit-jupiter-engine'
    testImplementation 'org.assertj:assertj-core'
    testImplementation 'org.mockito:mockito-core:5.14.2'

    // Tests d'intégration (Testcontainers PostgreSQL)
    testImplementation platform('org.testcontainers:testcontainers-bom:1.20.4')
    testImplementation 'org.testcontainers:junit-jupiter'
    testImplementation 'org.testcontainers:postgresql'
    testImplementation 'org.postgresql:postgresql:42.7.3'
}

micronaut {
    runtime 'lambda_provided'
    testRuntime 'junit5'
    processing {
        incremental true
        annotations 'org.ucjgsalm.locagest.*'
    }
    aot {
        optimizeServiceLoading       = false
        convertYamlToJava            = true
        precomputeOperations         = true
        cacheEnvironment             = true
        optimizeClassLoading         = true
        deduceEnvironment            = true
        optimizeNetty                = true
    }
}

shadowJar {
    archiveClassifier = 'all'
    mergeServiceFiles()
}

// ── Classes exclues du calcul de couverture ────────────────────────────────
// - Classes générées par Micronaut (introspection AOT, $...$Introspection)
// - Records de domaine et DTOs : porteurs de données sans logique métier
// - Couche contrôleur : couche mince de mapping HTTP/JSON, testée via TI API
// - Adaptateurs infrastructure AWS (S3, SES) et PDF : requièrent des
//   services externes réels ; remplacés par @MockBean dans les TI
// - GlobalExceptionHandler : gestionnaire HTTP global, pas de logique métier
def jacocoExcludes = [
    '**/$*',                                             // classes Micronaut générées (préfixe $)
    'org/ucjgsalm/locagest/domain/**',                   // records de domaine
    'org/ucjgsalm/locagest/dto/**',                      // DTOs (records request/response)
    'org/ucjgsalm/locagest/controller/**',               // contrôleurs HTTP (mapping pur)
    'org/ucjgsalm/locagest/util/AwsClientFactory*',      // factory AWS
    'org/ucjgsalm/locagest/util/GlobalExceptionHandler*',// gestionnaire d'erreurs HTTP global
    'org/ucjgsalm/locagest/service/S3Service*',          // adaptateur AWS S3
    'org/ucjgsalm/locagest/service/EmailService*',       // adaptateur AWS SES
    'org/ucjgsalm/locagest/service/PdfService*',         // génération PDF (sortie binaire)
]

jacoco {
    toolVersion = '0.8.13'  // Java 25 support
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required  = true    // pour les outils CI (GitHub Actions, SonarQube…)
        html.required = true    // rapport lisible : build/reports/jacoco/test/html/
        csv.required  = false
    }
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: jacocoExcludes)
        }))
    }
}

jacocoTestCoverageVerification {
    dependsOn test
    violationRules {
        rule {
            // Seuil global : 70 % de lignes couvertes (conforme aux specs TI)
            limit {
                counter = 'LINE'
                value   = 'COVEREDRATIO'
                minimum = 0.70
            }
        }
    }
    afterEvaluate {
        classDirectories.setFrom(jacocoTestReport.classDirectories)
    }
}

test {
    useJUnitPlatform()
    // Byte Buddy (Mockito) requiert ces ouvertures pour instrumenter les classes sous Java 21+
    jvmArgs '-XX:+EnableDynamicAgentLoading',
            '--add-opens=java.base/java.lang=ALL-UNNAMED',
            '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED',
            '-Dnet.bytebuddy.experimental=true'
    finalizedBy jacocoTestReport   // rapport généré automatiquement après chaque run de tests
}

// jacocoTestCoverageVerification est inclus dans le cycle 'check' standard
check.dependsOn jacocoTestCoverageVerification
