# Configuration pour le développement local (activée par MICRONAUT_ENVIRONMENTS=local)
# Utilisé par : ./gradlew runLocal

micronaut:
  security:
    enabled: false          # Cognito non disponible en local → sécurité désactivée
    token:
      jwt:
        enabled: false

datasources:
  default:
    hikari:
      maximum-pool-size: 5  # Pool plus large qu'en Lambda (pas de contrainte par invocation)
      minimum-idle:      2
