AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: salm-facture – Backend Lambda Java

Globals:
  Function:
    Runtime: java21
    Architectures: [x86_64]
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]

Resources:

  # ── API Gateway ────────────────────────────────────────────────────────────
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub salm-facture-api-${Environment}
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  # ── Lambda ─────────────────────────────────────────────────────────────────
  BackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub salm-facture-backend-${Environment}
      Handler: com.salm.facture.Handler::handleRequest
      CodeUri: target/salm-facture.jar
      Description: salm-facture backend handler
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DocumentsBucket
        - S3WritePolicy:
            BucketName: !Ref DocumentsBucket
      Events:
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /{proxy+}
            Method: ANY

  # ── S3 – Documents ─────────────────────────────────────────────────────────
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub salm-facture-documents-${Environment}
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: archive-old-versions
            Status: Enabled
            NoncurrentVersionTransitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  ApiUrl:
    Description: URL de l'API Gateway
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub salm-facture-api-url-${Environment}

  DocumentsBucketName:
    Description: Nom du bucket S3 documents
    Value: !Ref DocumentsBucket
    Export:
      Name: !Sub salm-facture-documents-bucket-${Environment}

  BackendFunctionArn:
    Description: ARN de la fonction Lambda
    Value: !GetAtt BackendFunction.Arn