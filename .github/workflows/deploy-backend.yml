name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'prod'
        type: choice
        options: [prod, staging]

env:
  AWS_REGION: eu-west-3
  SAM_STACK_NAME: salm-facture-backend
  SAM_S3_BUCKET: salm-facture-sam-artifacts

jobs:
  deploy:
    name: Build & Deploy Lambda
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: gradle

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Gradle
        working-directory: backend
        run: ./gradlew shadowJar

      - name: SAM Build
        working-directory: backend
        run: sam build --config-file samconfig.toml

      - name: SAM Deploy
        working-directory: backend
        run: |
          sam deploy \
            --config-file samconfig.toml \
            --stack-name ${{ env.SAM_STACK_NAME }}-${{ github.event.inputs.environment || 'prod' }} \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Environment=${{ github.event.inputs.environment || 'prod' }}