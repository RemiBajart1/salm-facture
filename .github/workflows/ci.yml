name: CI

on:
  push:
    branches-ignore:
      - main
      - develop
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  plugin-test-unit:
    name: Plugin - Tests unitaires
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, gd, intl, fileinfo
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run unit tests
        run: vendor/bin/phpunit --configuration phpunit.xml

  plugin-test-integration:
    name: Plugin - Tests d'intégration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start Docker services
        run: docker compose up --build -d

      - name: Wait for wp-config.php (WordPress configured)
        run: |
          echo "Attente de la configuration WordPress..."
          timeout 120 bash -c 'until docker exec locagest-wp test -f /var/www/html/wp-config.php; do sleep 5; done'
          echo "WordPress configuré."

      - name: Install WordPress core via WP-CLI
        run: |
          docker exec locagest-wp wp core install \
            --url="http://localhost" \
            --title="LocaGest CI" \
            --admin_user="admin" \
            --admin_password="admin" \
            --admin_email="admin@ci.test" \
            --allow-root \
            --skip-email

      - name: Activate plugin (exécute les migrations)
        run: docker exec locagest-wp wp plugin activate locagest --allow-root

      - name: Install Composer dependencies in container
        run: |
          docker exec locagest-wp bash -c \
            "cd /var/www/html/wp-content/plugins/locagest && composer install --no-interaction --prefer-dist"

      - name: Run integration tests
        run: |
          docker exec locagest-wp bash -c \
            "cd /var/www/html/wp-content/plugins/locagest && vendor/bin/phpunit --configuration phpunit-integration.xml"

      - name: Stop Docker services
        if: always()
        run: docker compose down -v

  frontend-build:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check frontend exists
        id: check
        run: echo "exists=$(test -f plugin/frontend/package.json && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Setup Node
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: plugin/frontend/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci
        working-directory: plugin/frontend

      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: npm run build
        working-directory: plugin/frontend

      - name: Test
        if: steps.check.outputs.exists == 'true'
        run: npm test -- --run
        working-directory: plugin/frontend
